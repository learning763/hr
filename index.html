<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HRMS | Nepali Army Personnel Portal</title>
    <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"> -->
    <!-- <link href="/hrs/css/inter.css" rel="stylesheet"> -->

    <link href="css/fontawesome.css" rel="stylesheet">
    <link href="plugins/select2/css/select2.min.css" rel="stylesheet">
    <link href="plugins/select2/css/select2-bootstrap-5-theme.min.css" rel="stylesheet">
    <link href="css/nepali.datepicker.v4.0.8.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Kalimati';
            background: linear-gradient(135deg, #081b2e 0%, #0e7490 50%, #0b2a45 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Military Pattern Overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }

        @keyframes modalPopIn {
            from {
                opacity: 0;
                transform: scale(0.94) translateY(16px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .container {
            width: 100%;
            max-width: 400px;
            transition: max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
            animation: modalPopIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Signup gets wider */
        #signupCard.active-form {
            max-width: 720px;
            width: 720px;
            margin: 0 auto;
        }

        @media (max-width: 920px) {
            #signupCard.active-form {
                width: 95%;
                max-width: 95%;
            }
        }

        .form-card {
            position: relative;
            transition: opacity 0.22s ease, transform 0.22s ease;
        }

        .form-card-inner {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            box-shadow: 0 25px 60px -12px rgba(8, 27, 46, 0.45), 0 12px 30px -14px rgba(14, 116, 144, 0.35);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Header - Enhanced Military Style */
        .form-header {
            background: linear-gradient(135deg, #10263f 0%, #0e7490 100%);
            padding: 28px 28px 16px 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .form-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 60%;
            height: 200%;
            background: rgba(34, 211, 238, 0.08);
            transform: rotate(35deg);
        }

        .form-header h3 {
            font-size: 19px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #ffffff;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            z-index: 1;
        }

        .form-header h3 i {
            font-size: 20px;
            color: #22d3ee;
        }

        .form-header p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.75);
            margin-top: 2px;
            position: relative;
            z-index: 1;
            letter-spacing: 0.2px;
        }

        form {
            padding: 22px 28px 26px;
        }

        /* Grid for signup - two columns */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 16px;
        }

        .full-width {
            grid-column: span 2;
        }

        /* Label styling */
        .input-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
            position: relative;
        }

        .input-field label {
            font-size: 12px;
            font-weight: 600;
            color: #334155;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-field label i {
            font-size: 12px;
            color: #0e7490;
        }

        .input-field .required-star {
            color: #dc2626;
            font-size: 11px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper i.input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #9aa9bc;
            font-size: 14px;
            pointer-events: none;
            z-index: 2;
            transition: color 0.2s;
        }

        .input-wrapper input, .input-wrapper select {
            width: 100%;
            padding: 9px 14px 9px 40px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 13px;
            transition: all 0.2s;
            outline: none;
            background: #ffffff;
            font-family: inherit;
            color: #1e2a3e;
            font-weight: 500;
        }

        .input-wrapper select {
            padding: 9px 36px 9px 40px;
            cursor: pointer;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%23899ab3" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 12px center;
        }

        /* Select2 renders its own markup over the <select>; match it to the rest of the form */
        .select2-container .select2-selection--single {
            height: auto !important;
            padding: 9px 36px 9px 40px !important;
            border: 1.5px solid #e2e8f0 !important;
            border-radius: 12px !important;
        }
        .select2-container .select2-selection__rendered {
            padding: 0 !important;
            font-size: 13px !important;
            color: #1e2a3e !important;
            line-height: 1.3 !important;
        }
        .select2-container .select2-selection__arrow {
            height: 100% !important;
        }
        .select2-dropdown {
            font-size: 13px;
        }
        .select2-results__option {
            font-size: 13px !important;
        }
        .select2-search__field {
            font-size: 13px !important;
        }

        .input-wrapper input:focus, .input-wrapper select:focus {
            border-color: #0e7490;
            box-shadow: 0 0 0 4px rgba(14, 116, 144, 0.1);
        }

        .input-wrapper input:focus + i.input-icon,
        .input-wrapper select:focus + i.input-icon {
            color: #0e7490;
        }

        .toggle-eye {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9aa9bc;
            font-size: 14px;
            z-index: 3;
            transition: all 0.2s;
        }

        .toggle-eye:hover {
            color: #0e7490;
        }

        /* Strength meter */
        .strength-wrapper {
            margin-top: 4px;
        }
        .strength-bar {
            height: 4px;
            background: #edf2f7;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }
        .strength-fill {
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
            background: #cbd5e1;
        }
        .strength-label {
            font-size: 10px;
            margin-top: 6px;
            color: #7c8ba0;
            display: block;
            text-align: right;
            font-weight: 600;
        }

        .match-hint {
            font-size: 11px;
            margin-top: 6px;
            display: block;
            font-weight: 500;
        }

        /* Options row */
        .form-options {
            display: flex;
            align-items: center;
            margin: 12px 0 16px;
            font-size: 12px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: #4a5a72;
            font-weight: 500;
        }

        .checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #0e7490;
        }

        .btn-submit {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #10263f 0%, #0e7490 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 38, 63, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .terms-box {
            margin: 6px 0 3px;
        }

        .switch-text {
            text-align: center;
            font-size: 13px;
            color: #6a7b94;
            margin-top: 16px;
            padding-top: 4px;
        }

        .switch-text a {
            color: #0e7490;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .switch-text a:hover {
            text-decoration: underline;
            color: #10263f;
        }

        /* Toast Container */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Toast Notification Styles */
        .toast-notification {
            border-radius: 12px;
            padding: 14px 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideRight 0.3s ease;
            max-width: 380px;
            min-width: 280px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            border-left: 4px solid;
            background: white;
        }
        
        .toast-notification i {
            font-size: 20px;
        }
        
        .toast-notification .message {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
            flex: 1;
            color: #1a2c3e;
        }
        
        .toast-notification.success {
            border-left-color: #10b981;
        }
        
        .toast-notification.success i {
            color: #10b981;
        }
        
        .toast-notification.error {
            border-left-color: #dc2626;
        }
        
        .toast-notification.error i {
            color: #dc2626;
        }
        
        .toast-notification.info {
            border-left-color: #3b82f6;
        }
        
        .toast-notification.info i {
            color: #3b82f6;
        }
        
        .toast-notification.warning {
            border-left-color: #f59e0b;
        }
        
        .toast-notification.warning i {
            color: #f59e0b;
        }
        
        @keyframes slideRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }

        /* Loading state */
        .btn-submit.loading {
            position: relative;
            color: transparent !important;
            pointer-events: none;
        }
        .btn-submit.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 700px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .full-width {
                grid-column: span 1;
            }
            form {
                padding: 18px 18px 22px;
            }
            .form-header h3 {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- LOGIN CARD -->
    <div class="form-card" id="loginCard">
        <div class="form-card-inner">
        <div class="form-header">
            <h3><i class="fas fa-shield-alt"></i> Nepali Army HRMS</h3>
            <p>Secure Personnel Management System</p>
        </div>
        <form id="loginForm">
            <div class="input-field">
                <label><i class="fa-solid fa-envelope"></i>Email Address <span class="required-star">*</span></label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" id="loginEmail" placeholder="your.email@nepalarmy.mil.np" autocomplete="email" required>
                </div>
            </div><br>
            <div class="input-field">
                <label><i class="fas fa-lock"></i> Password <span class="required-star">*</span></label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required>
                    <i class="fas fa-eye-slash toggle-eye" data-target="loginPassword"></i>
                </div>
            </div>
            <div class="form-options">
                <label class="checkbox">
                    <input type="checkbox" id="rememberMe"> Keep me signed in
                </label>
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-arrow-right-to-bracket"></i> Sign In</button>
            <div class="switch-text">
                New to HRMS? <a id="goToSignup">Create account →</a>
            </div>
        </form>
        </div>
    </div>

    <!-- SIGNUP CARD (wider, with army fields + labels) -->
    <div class="form-card" id="signupCard" style="display: none;">
        <div class="form-card-inner">
        <div class="form-header">
            <h3><i class="fas fa-user-plus"></i> Personnel Registration</h3>
            <p>Complete your military profile to get access</p>
        </div>
        <form id="signupForm">
            <div class="form-grid">
                <!-- Full name -->
                <div class="input-field">
                    <label><i class="fas fa-user"></i> Full Name (English)<span class="required-star">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="fullName" placeholder="e.g., Rajveer Singh" required>
                    </div>
                </div>
                <!-- Full name (Nepali) -->
                <div class="input-field">
                    <label><i class="fas fa-user"></i> पुरा नाम (नेपाली)<span class="required-star">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="fullNameNe" placeholder="जस्तै, राजवीर सिंह" required>
                    </div>
                </div>
                <!-- Email -->
                <div class="input-field">
                    <label><i class="fas fa-envelope"></i> Email Address <span class="required-star">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="signupEmail" placeholder="official@nepalarmy.mil.np" required>
                    </div>
                </div>
                <!-- Rank dropdown -->
                <div class="input-field">
                    <label><i class="fas fa-star-of-life"></i> Rank <span class="required-star">*</span></label>
                    <div class="input-wrapper">                        
                        <select id="armyRank" required>                            
                             <option value="">Select Rank</option>

                            <!-- <option value="" disabled selected>Select rank</option>
                            <option>General</option><option>Lieutenant General</option><option>Major General</option>
                            <option>Brigadier General</option><option>Colonel</option><option>Lieutenant Colonel</option>
                            <option>Major</option><option>Captain</option><option>Lieutenant</option>
                            <option>Second Lieutenant</option><option>Subedar Major</option><option>Subedar</option>
                            <option>Naib Subedar</option><option>Havildar</option><option>Naik</option>
                            <option>Lance Naik</option><option>Sepoy</option> -->
                        </select>
                    </div>
                </div>
                <!-- Branch / Unit (Arm) -->
                <div class="input-field">
                    <label><i class="fas fa-building"></i> Unit/Branch <span class="required-star">*</span></label>
                    <div class="input-wrapper">
                        <select id="branchArm" required>
                            <option value="">Select Department</option>
                        </select>
                    </div>
                </div>
                <!-- Custom unit name, shown only when "Other" is selected above -->
                <div class="input-field full-width" id="branchArmOtherWrapper" style="display: none;">
                    <label><i class="fas fa-pen"></i> आफ्नो एकाइको नाम लेख्नुहोस् <span class="required-star">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-pen input-icon"></i>
                        <input type="text" id="branchArmOther" placeholder="Enter your unit/branch name">
                    </div>
                </div>
                <!-- Service Number -->
                <div class="input-field">
                    <label><i class="fas fa-id-card"></i> Personnel Number <span class="required-star">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card input-icon"></i>
                        <input type="text" id="serviceNo" placeholder="e.g., NA-12345" required>
                    </div>
                </div>
                <!-- Date of commission -->
                <div class="input-field">
                    <label><i class="fas fa-calendar-alt"></i> Commission Date <span class="required-star">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-calendar-alt input-icon"></i>
                        <input type="text" id="commissionDate" class="nepali-datepicker" required>
                    </div>
                </div>
                <!-- Password (full width) -->
                <div class="input-field full-width">
                    <label><i class="fas fa-key"></i> Password <span class="required-star">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="signupPassword" placeholder="Minimum 8 characters" required>
                        <i class="fas fa-eye-slash toggle-eye" data-target="signupPassword"></i>
                    </div>
                    <div class="strength-wrapper">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <span class="strength-label" id="strengthText">Use 8+ characters with letters & numbers</span>
                    </div>
                </div>
                <!-- Confirm password -->
                <div class="input-field full-width">
                    <label><i class="fas fa-check-double"></i> Confirm Password <span class="required-star">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-check-circle input-icon"></i>
                        <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                        <i class="fas fa-eye-slash toggle-eye" data-target="confirmPassword"></i>
                    </div>
                    <div id="matchHint" class="match-hint"></div>
                </div>
                <!-- Terms and conditions -->
                <div class="input-field full-width terms-box">
                    <label class="checkbox">
                        <input type="checkbox" id="termsCheck" required>
                        <span>I accept the <a href="#" style="color:#0e7490;">Terms of Service</a> and <a href="#" style="color:#0e7490;">Privacy Policy</a></span>
                    </label>
                </div>
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-user-plus"></i> Register</button>
            <div class="switch-text">
                Already registered? <a id="goToLogin">Sign in →</a>
            </div>
        </form>
        </div>
    </div>
</div>

<script>
    // Toast notification system using your exact styles
    function showToast(message, type = 'success') {
        // Create toast container if it doesn't exist
        let toastContainer = document.querySelector('.toast-container');
        if (!toastContainer) {
            toastContainer = document.createElement('div');
            toastContainer.className = 'toast-container';
            document.body.appendChild(toastContainer);
        }
        
        // Create toast element
        const toast = document.createElement('div');
        toast.className = `toast-notification ${type}`;
        
        let icon = 'fa-check-circle';
        if (type === 'error') icon = 'fa-exclamation-circle';
        if (type === 'info') icon = 'fa-info-circle';
        if (type === 'warning') icon = 'fa-exclamation-triangle';
        
        toast.innerHTML = `
            <i class="fas ${icon}"></i>
            <div class="message">${message}</div>
        `;
        
        toastContainer.appendChild(toast);
        
        // Auto remove after 3 seconds with fadeOut animation
        setTimeout(() => {
            toast.style.animation = 'fadeOut 0.3s ease';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    document.addEventListener('DOMContentLoaded', function() {
        // ========== TOGGLE FORMS ==========
        const loginCard = document.getElementById('loginCard');
        const signupCard = document.getElementById('signupCard');
        const container = document.querySelector('.container');

        // Cross-fades between the login/signup cards like a modal swapping content
        function switchCard(hideEl, showEl, maxWidth, onShown) {
            hideEl.style.transition = 'opacity 0.18s ease, transform 0.18s ease';
            hideEl.style.opacity = '0';
            hideEl.style.transform = 'scale(0.96) translateY(8px)';
            setTimeout(() => {
                hideEl.style.display = 'none';
                hideEl.style.transition = '';
                hideEl.style.opacity = '';
                hideEl.style.transform = '';

                container.style.maxWidth = maxWidth;
                showEl.style.display = 'block';
                showEl.style.opacity = '0';
                showEl.style.transform = 'scale(0.96) translateY(8px)';

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        showEl.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
                        showEl.style.opacity = '1';
                        showEl.style.transform = 'scale(1) translateY(0)';
                    });
                });

                if (onShown) onShown();
            }, 180);
        }

        function showLoginForm() {
            signupCard.classList.remove('active-form');
            switchCard(signupCard, loginCard, '400px');
            document.querySelectorAll('.btn-submit').forEach(btn => btn.classList.remove('loading'));
        }

        function showSignupForm() {
            switchCard(loginCard, signupCard, '720px', () => signupCard.classList.add('active-form'));
            document.querySelectorAll('.btn-submit').forEach(btn => btn.classList.remove('loading'));
            if(document.getElementById('signupPassword')) updateStrengthMeter('');
            checkMatch();
        }

        document.getElementById('goToSignup')?.addEventListener('click', (e) => {
            e.preventDefault();
            showSignupForm();
        });
        
        document.getElementById('goToLogin')?.addEventListener('click', (e) => {
            e.preventDefault();
            showLoginForm();
        });

        // ========== UNIT/BRANCH "OTHER" TOGGLE ==========
        const branchArmSelect = document.getElementById('branchArm');
        const branchArmOtherWrapper = document.getElementById('branchArmOtherWrapper');
        const branchArmOtherInput = document.getElementById('branchArmOther');

        function toggleBranchArmOther() {
            if (branchArmSelect.value === 'other') {
                branchArmOtherWrapper.style.display = 'flex';
                branchArmOtherInput.setAttribute('required', 'required');
            } else {
                branchArmOtherWrapper.style.display = 'none';
                branchArmOtherInput.removeAttribute('required');
                branchArmOtherInput.value = '';
            }
        }

        branchArmSelect?.addEventListener('change', toggleBranchArmOther);

        // ========== PASSWORD TOGGLE ==========
        document.querySelectorAll('.toggle-eye').forEach(icon => {
            icon.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if(input) {
                    const type = input.type === 'password' ? 'text' : 'password';
                    input.type = type;
                    this.classList.toggle('fa-eye-slash');
                    this.classList.toggle('fa-eye');
                }
            });
        });

        // ========== PASSWORD STRENGTH ==========
        function updateStrengthMeter(pwd) {
            const fill = document.getElementById('strengthFill');
            const textSpan = document.getElementById('strengthText');
            if (!fill) return;
            let score = 0;
            if(pwd.length >= 8) score += 1;
            if(pwd.length >= 12) score += 1;
            if(/[A-Z]/.test(pwd)) score += 1;
            if(/[0-9]/.test(pwd)) score += 1;
            if(/[^A-Za-z0-9]/.test(pwd)) score += 1;
            let percent = Math.min(100, score * 20);
            fill.style.width = percent + '%';
            if(percent <= 20) {
                fill.style.backgroundColor = '#dc2626';
                if(textSpan) textSpan.innerText = 'Weak - Use 8+ characters';
            } else if(percent <= 60) {
                fill.style.backgroundColor = '#f59e0b';
                if(textSpan) textSpan.innerText = 'Medium - Add numbers & symbols';
            } else {
                fill.style.backgroundColor = '#10b981';
                if(textSpan) textSpan.innerText = 'Strong password!';
            }
            if(pwd.length === 0 && textSpan) textSpan.innerText = 'Use 8+ characters with letters & numbers';
        }

        function checkMatch() {
            const pwd = document.getElementById('signupPassword')?.value || '';
            const confirm = document.getElementById('confirmPassword')?.value || '';
            const hint = document.getElementById('matchHint');
            if(!hint) return;
            if(confirm.length === 0) { hint.innerHTML = ''; return; }
            if(pwd === confirm) {
                hint.innerHTML = '✓ Passwords match';
                hint.style.color = '#10b981';
            } else {
                hint.innerHTML = '✗ Passwords do not match';
                hint.style.color = '#dc2626';
            }
        }

        const pwdField = document.getElementById('signupPassword');
        if(pwdField) {
            pwdField.addEventListener('input', (e) => {
                updateStrengthMeter(e.target.value);
                checkMatch();
            });
        }
        
        const confirmField = document.getElementById('confirmPassword');
        if(confirmField) confirmField.addEventListener('input', checkMatch);

        // ========== LOGIN HANDLER ==========
        const loginFormElem = document.getElementById('loginForm');
        loginFormElem.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const remember = document.getElementById('rememberMe').checked;
            
            if(!email || !password) {
                showToast('Please enter email and password', 'error');
                return;
            }
            if(!email.includes('@')) {
                showToast('Valid email required', 'error');
                return;
            }
            
            const btn = loginFormElem.querySelector('.btn-submit');
            btn.classList.add('loading');
            
            try {
                const formData = new URLSearchParams();
                formData.append('email', email);
                formData.append('password', password);
                formData.append('remember', remember);
                
                const response = await fetch('login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData.toString()
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast(result.message || 'Login successful! Redirecting...', 'success');
                    
                    // Store user info
                    sessionStorage.setItem('user_email', result.user.email);
                    sessionStorage.setItem('user_name', result.user.name);
                    sessionStorage.setItem('user_rank', result.user.rank);
                    sessionStorage.setItem('user_unit', result.user.unit);
                    sessionStorage.setItem('hrms_logged_in', 'true');
                    
                    if(remember) {
                        localStorage.setItem('hrms_email', email);
                        localStorage.setItem('hrms_logged_in', 'true');
                    } else {
                        localStorage.removeItem('hrms_email');
                        localStorage.removeItem('hrms_logged_in');
                    }
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'dashboard.php';
                    }, 1500);
                } else {
                    showToast(result.error || 'Invalid email or password', 'error');
                    btn.classList.remove('loading');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Login failed. Please try again.', 'error');
                btn.classList.remove('loading');
            }
        });

        // ========== SIGNUP HANDLER ==========
        const signupFormElem = document.getElementById('signupForm');
        signupFormElem.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const fullNameNe = document.getElementById('fullNameNe').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const rank = document.getElementById('armyRank').value;
            const branch = branchArmSelect.value;
            const branchText = branch === 'other'
                ? branchArmOtherInput.value.trim()
                : (branchArmSelect.options[branchArmSelect.selectedIndex]?.text || '');
            const serviceNo = document.getElementById('serviceNo').value.trim();
            const commissionDate = document.getElementById('commissionDate').value;
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('termsCheck').checked;

            if(!fullName || !fullNameNe || !email || !rank || !branch || !branchText || !serviceNo || !commissionDate) {
                showToast('All fields are required', 'error');
                return;
            }
            if(!email.includes('@')) {
                showToast('Enter valid email address', 'error');
                return;
            }
            if(password.length < 8) {
                showToast('Password must be at least 8 characters', 'error');
                return;
            }
            if(password !== confirm) {
                showToast('Passwords do not match', 'error');
                return;
            }
            if(!terms) {
                showToast('Please accept the terms', 'error');
                return;
            }

            const btn = signupFormElem.querySelector('.btn-submit');
            btn.classList.add('loading');
            
            try {
                const formData = new URLSearchParams();
                formData.append('full_name', fullName);
                formData.append('full_name_ne', fullNameNe);
                formData.append('email', email);
                formData.append('rank', rank);
                formData.append('unit', branchText);
                formData.append('personnel_number', serviceNo);
                formData.append('joint_date', commissionDate);
                formData.append('password', password);
                formData.append('confirm_password', confirm);
                
                const response = await fetch('signup.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData.toString()
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast(result.message, 'success');
                    
                    // Auto-fill login form with registered email
                    const loginEmailInput = document.getElementById('loginEmail');
                    if(loginEmailInput) loginEmailInput.value = email;
                    
                    // Reset signup form
                    document.getElementById('fullName').value = '';
                    document.getElementById('fullNameNe').value = '';
                    document.getElementById('signupEmail').value = '';
                    document.getElementById('armyRank').value = '';
                    document.getElementById('branchArm').value = '';
                    toggleBranchArmOther();
                    document.getElementById('serviceNo').value = '';
                    document.getElementById('commissionDate').value = '';
                    document.getElementById('signupPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                    document.getElementById('termsCheck').checked = false;
                    if(pwdField) updateStrengthMeter('');
                    document.getElementById('matchHint').innerHTML = '';
                    
                    // Switch to login form after delay
                    setTimeout(() => {
                        showLoginForm();
                        showToast('Please login with your credentials', 'success');
                    }, 1500);
                } else {
                    showToast(result.error, 'error');
                    btn.classList.remove('loading');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Registration failed. Please try again.', 'error');
                btn.classList.remove('loading');
            }
        });

        // Check if already logged in
        async function checkAuth() {
            try {
                const response = await fetch('includes/check_auth.php');
                if (response.ok) {
                    const result = await response.json();
                    if (result.authenticated) {
                        window.location.href = 'dashboard.php';
                    }
                }
            } catch (error) {
                console.error('Auth check error:', error);
                // If session check fails, check localStorage/sessionStorage as fallback
                if(sessionStorage.getItem('hrms_logged_in') === 'true' || localStorage.getItem('hrms_logged_in') === 'true') {
                    window.location.href = 'dashboard.php';
                }
            }
        }
        
        checkAuth();

        // Auto-fill remembered email
        const remembered = localStorage.getItem('hrms_email');
        if(remembered) {
            const emailField = document.getElementById('loginEmail');
            if(emailField) emailField.value = remembered;
            const checkRemember = document.getElementById('rememberMe');
            if(checkRemember) checkRemember.checked = true;
        }

        // Initialize strength meter
        if(pwdField) updateStrengthMeter('');
        checkMatch();
    });

    //to load rank and department
    async function loadDropdowns() {

    try {

        const response = await fetch('signup.php?action=get_dropdowns');

        const data = await response.json();

        if (!data.success) return;

        const rank = document.getElementById('armyRank');
        const dept = document.getElementById('branchArm');

        // Rank
        data.ranks.forEach(item => {

            const option = document.createElement('option');

            option.value = item.rank_code;
            option.textContent = `${item.rank_code} - ${item.rank_unicode}`;
            rank.appendChild(option);

        });

        // Department
        data.departments.forEach(item => {

            const option = document.createElement('option');

            option.value = item.id;
            option.textContent = item.name_nep;

            dept.appendChild(option);

        });

        // "Other" always comes last, so the user can type in a unit that isn't listed
        const otherOption = document.createElement('option');
        otherOption.value = 'other';
        otherOption.textContent = 'अन्य (Other)';
        dept.appendChild(otherOption);

        // Notify Select2 of new options
        if (window.$ && $.fn.select2) {
            $(rank).trigger('change');
            $(dept).trigger('change');
        }

    } catch (err) {

        console.error(err);

    }

}

loadDropdowns();
</script>

$(document).ready(function() {
    $('select').select2({
        theme: 'bootstrap-5',
        placeholder: 'Select an option',
        allowClear: true,
        width: '100%',
        minimumResultsForSearch: 10
    });
    $('.nepali-datepicker').nepaliDatePicker();
});
</script>
